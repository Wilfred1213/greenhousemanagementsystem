<div class="list-group">

    {% for c in conversations %}
    
    <a
    
        href="{% url 'ai:conversation' c.id %}"
    
        class="list-group-item list-group-item-action">
    
        🌱 {{ c.title }}
    
    </a>
    
    {% empty %}
    
    <div class="text-muted text-center">
    
    No conversations yet
    
    </div>
    
    {% endfor %}
    
    </div>
